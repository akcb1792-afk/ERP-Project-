<div class="container">
  <div class="header">
    <h2>{{ title }}</h2>
    <button mat-raised-button color="accent" routerLink="/customers/list">
      <mat-icon>list</mat-icon>
      View Customers
    </button>
  </div>

  <div class="form-container">
    <mat-card class="form-card">
      <mat-card-header>
        <mat-card-title>Add New Customer</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Customer Name *</mat-label>
              <input matInput formControlName="name" placeholder="Enter customer name">
              <mat-error *ngIf="customerForm.get('name')?.hasError('required')">Customer name is required</mat-error>
              <mat-error *ngIf="customerForm.get('name')?.hasError('minlength')">Name must be at least 2 characters</mat-error>
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Customer Type *</mat-label>
              <mat-select formControlName="customerType">
                <mat-option *ngFor="let type of customerTypes" [value]="type">
                  {{ type }}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" placeholder="Enter email address">
              <mat-error *ngIf="customerForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Phone</mat-label>
              <input matInput formControlName="phone" placeholder="Enter 10-digit phone number">
              <mat-error *ngIf="customerForm.get('phone')?.hasError('pattern')">Please enter a valid 10-digit phone number</mat-error>
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Address</mat-label>
              <textarea matInput formControlName="address" placeholder="Enter address" rows="3"></textarea>
            </mat-form-field>
          </div>
        </form>
      </mat-card-content>
      
      <mat-card-actions align="end">
        <button mat-button (click)="onCancel()">Cancel</button>
        <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isLoading || customerForm.invalid">
          <mat-icon>person_add</mat-icon>
          Create Customer
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
