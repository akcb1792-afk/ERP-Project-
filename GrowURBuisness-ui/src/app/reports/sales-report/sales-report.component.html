<div class="container">
  <h2>{{ title }}</h2>

  <div class="stats-grid">
    <mat-card class="stats-card">
      <mat-card-header>
        <mat-card-title>Total Sales</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stats-value">{{ totalSales | number:'1.2-2' }}</div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stats-card">
      <mat-card-header>
        <mat-card-title>Total Invoices</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stats-value">{{ totalInvoices }}</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="table-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Daily Sales</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <table mat-table [dataSource]="salesData" class="mat-elevation-z1">
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Date </th>
            <td mat-cell *matCellDef="let row"> {{row.date | date:'medium'}} </td>
          </ng-container>

          <ng-container matColumnDef="totalSales">
            <th mat-header-cell *matHeaderCellDef> Total Sales </th>
            <td mat-cell *matCellDef="let row"> {{row.totalSales | number:'1.2-2'}} </td>
          </ng-container>

          <ng-container matColumnDef="invoiceCount">
            <th mat-header-cell *matHeaderCellDef> Invoice Count </th>
            <td mat-cell *matCellDef="let row"> {{row.invoiceCount}} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
</div>
